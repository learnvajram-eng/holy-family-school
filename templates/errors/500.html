{% extends "base.html" %}
{% block title %}Server Error – Holy Family School{% endblock %}
{% block content %}
<div class="error-page text-center py-5">
  <div class="container">
    <div class="error-code text-maroon">500</div>
    <h2 class="mb-3">Something Went Wrong</h2>
    <p class="text-muted mb-4">We're sorry — our server encountered an error. Please try again shortly.</p>
    <a href="{{ url_for('main_bp.index') }}" class="btn btn-maroon px-4">
      <i class="bi bi-house-fill me-2"></i>Back to Home
    </a>
  </div>
</div>
{% endblock %}
